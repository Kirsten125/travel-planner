<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Hub</title>
<link rel="stylesheet" href="./css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header class="app-header">
  <h1>Travel Hub</h1>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab-btn="itinerary">行程規劃</button>
  <button class="tab-btn" data-tab-btn="exchange">匯率工具</button>
  <button class="tab-btn" data-tab-btn="packing">行李清單</button>
</nav>

<main class="container">

<!-- 行程 -->
<section id="tab-itinerary" class="tab-panel">
<div class="panel">
<h2>行程規劃</h2>

<form id="itineraryForm" class="form-grid">
<input type="date" id="iDate" required>
<input type="time" id="iTime" required>
<input type="text" id="iTitle" placeholder="活動" required>
<input type="text" id="iLocation" placeholder="地點">
<input type="text" id="iTransport" placeholder="交通">
<input type="text" id="iNote" placeholder="備註">
<button type="submit" class="primary-btn full">新增</button>
</form>

<table>
<thead>
<tr class="thead-center">
<th>排序</th>
<th>日期</th>
<th>時間</th>
<th>活動</th>
<th>地點</th>
<th>交通</th>
<th>備註</th>
<th>操作</th>
</tr>
</thead>
<tbody id="itineraryTbody"></tbody>
</table>

</div>
</section>

<!-- 匯率 -->
<section id="tab-exchange" class="tab-panel hidden">
<div class="panel">
<h2>匯率工具</h2>

<form id="fxForm" class="form-grid">

<input type="number" id="fxAmount" value="1000" required>

<select id="fxFrom"></select>

<select id="fxTo"></select>

<button type="button" id="swapBtn" class="secondary-btn">交換</button>
<button type="submit" class="primary-btn">換算</button>

</form>

<div class="fx-result" id="fxResult">請輸入金額</div>
<div id="fxMeta" class="muted"></div>

</div>
</section>

<!-- 行李 -->
<section id="tab-packing" class="tab-panel hidden">
<div class="panel">
<h2>行李清單</h2>

<button id="generatePacking" class="primary-btn">生成清單</button>

<ul id="packingList" class="check-list"></ul>

</div>
</section>

</main>

<script src="./js/app.js"></script>
</body>
</html>
